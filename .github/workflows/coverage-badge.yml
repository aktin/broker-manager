name: coverage-badge

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  badge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run test
      - name: Build coverage badge endpoint
        run: |
          pct=$(jq -r '.total.lines.pct' apps/web/coverage/coverage-summary.json)
          pct=${pct%.*}
          if [ "$pct" -ge 90 ]; then color=brightgreen
          elif [ "$pct" -ge 75 ]; then color=green
          elif [ "$pct" -ge 60 ]; then color=yellowgreen
          elif [ "$pct" -ge 40 ]; then color=orange
          else color=red
          fi
          mkdir -p badges
          printf '{"schemaVersion":1,"label":"coverage","message":"%s%%","color":"%s"}\n' "$pct" "$color" > badges/coverage.json
      - uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./badges
          keep_files: true
