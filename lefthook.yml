pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.{ts,vue,js,mjs,cjs}"
      run: PATH="$HOME/.bun/bin:$PATH" bunx eslint --fix {staged_files}
      stage_fixed: true
    format:
      glob: "*.{ts,vue,js,mjs,cjs,json,md,yml,yaml,css}"
      run: PATH="$HOME/.bun/bin:$PATH" bunx prettier --write {staged_files}
      stage_fixed: true

commit-msg:
  commands:
    commitlint:
      run: PATH="$HOME/.bun/bin:$PATH" bunx commitlint --edit {1}

pre-push:
  parallel: false
  commands:
    typecheck:
      run: PATH="$HOME/.bun/bin:$PATH" bun run typecheck
    test:
      run: PATH="$HOME/.bun/bin:$PATH" bun run test
    build:
      run: PATH="$HOME/.bun/bin:$PATH" bun run build
